version: '3.8'

services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017/orders
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    ports:
      - "80:80"
